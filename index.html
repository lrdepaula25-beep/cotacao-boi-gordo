// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmt(v, unit) {
  return 'R$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function dataHoje() {
  const d = new Date();
  return String(d.getDate()).padStart(2,'0') + '/' +
         String(d.getMonth()+1).padStart(2,'0') + '/' +
         String(d.getFullYear()).slice(2);
}

function badge(pct) {
  const s = pct>0?'▲':pct<0?'▼':'➡';
  const c = pct>0?'badge-up':pct<0?'badge-down':'badge-flat';
  return `<span class="badge-variacao ${c}">${s} ${(pct>=0?'+':'')}${pct.toFixed(2).replace('.',',')}%</span>`;
}

// ─── COTAÇÕES ─────────────────────────────────────────────────────────────────
function renderCardEstado(sigla, dados, unit) {
  const ultimo = dados.ultimo || dados.fechamento;
  const pct    = dados.variacao ?? ((ultimo - dados.fechamento) / dados.fechamento * 100);
  return `
    <div class="card-estado">
      <div class="card-estado-header">
        <span class="estado-bandeira">${dados.bandeira}</span>
        <div class="estado-nome">${dados.nome}</div>
        <div class="estado-praca">${dados.praca}</div>
      </div>
      <div class="tabela">
        <div class="tabela-linha destaque">
          <span class="tabela-chave">Último (${unit.toUpperCase()})</span>
          <span class="tabela-valor">${fmt(ultimo)}</span>
        </div>
        <div class="tabela-linha"><span class="tabela-chave">Compra</span><span class="tabela-valor">${fmt(dados.compra)}</span></div>
        <div class="tabela-linha"><span class="tabela-chave">Venda</span><span class="tabela-valor">${fmt(dados.venda)}</span></div>
        <div class="tabela-linha"><span class="tabela-chave">Abertura</span><span class="tabela-valor">${fmt(dados.abertura)}</span></div>
        <div class="tabela-linha"><span class="tabela-chave">Máx. / Mín.</span><span class="tabela-valor">${fmt(dados.max)} / ${fmt(dados.min)}</span></div>
        <div class="tabela-linha"><span class="tabela-chave">Fechamento ant.</span><span class="tabela-valor">${fmt(dados.fechamento)}</span></div>
        <div class="tabela-linha"><span class="tabela-chave">Data</span><span class="tabela-valor">${dados.data || dataHoje()}</span></div>
        <div class="tabela-linha"><span class="tabela-chave">Variação</span>${badge(pct)}</div>
      </div>
    </div>`;
}

function renderCotacoes(buscados) {
  const animal = animais[animalAtual];
  let html = '';
  for (const s of ['TO','GO','PA']) {
    const base  = animal.estados[s];
    const extra = (buscados && buscados[animalAtual] && buscados[animalAtual][s]) || {};
    html += renderCardEstado(s, {...base,...extra}, animal.unit);
  }
  document.getElementById('cards-cotacao').innerHTML = html;
}

// Tenta buscar URL via proxies em cascata — se um falhar, tenta o próximo
async function fetchComProxy(url) {
  const proxies = [
    (u) => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
    (u) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
    (u) => `https://thingproxy.freeboard.io/fetch/${u}`,
  ];

  for (const montarUrl of proxies) {
    try {
      const proxyUrl = montarUrl(url);
      const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
      if (!resp.ok) continue;
      const texto = await resp.text();
      // allorigins devolve JSON com campo "contents"
      try {
        const json = JSON.parse(texto);
        if (json.contents) return json.contents;
      } catch(e) {}
      // codetabs e thingproxy devolvem HTML direto
      if (texto.length > 200) return texto;
    } catch(e) {
      continue; // tenta o próximo proxy
    }
  }
  throw new Error('Todos os proxies falharam');
}

async function buscarNoticias() {
  const lista = document.getElementById('lista-noticias');
  lista.innerHTML = '<div class="loading-overlay"><div class="spinner"></div>Buscando notícias do Tocantins...</div>';

  const fontes = [
    {
      nome: 'Tocantins Rural',
      cls: 'tocantins-rural',
      url: 'https://tocantinsrural.com.br/categoria/pecuaria/',
      parseNoticias: (html) => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const items = [];
        doc.querySelectorAll('a[href*="tocantinsrural.com.br/"]').forEach(a => {
          const href = a.getAttribute('href') || '';
          const titulo = a.textContent.trim();
          if (titulo.length > 20 &&
              href.includes('tocantinsrural.com.br/') &&
              !href.includes('/categoria/') && !href.includes('/tag/') &&
              !href.includes('/autor/') && !href.match(/#$/) &&
              items.length < 6 &&
              !items.find(i => i.titulo === titulo)) {
            items.push({ titulo, url: href, data: '' });
          }
        });
        return items;
      }
    },
    {
      nome: 'Canal do Boi',
      cls: 'canal-boi',
      url: 'https://n.sba1.com/categorias/Pecuaria',
      parseNoticias: (html) => {
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const items = [];
        doc.querySelectorAll('a').forEach(a => {
          const href = a.getAttribute('href') || '';
          const titulo = a.textContent.trim();
          if (titulo.length > 20 && href.includes('/noticias/') && items.length < 5) {
            const url = href.startsWith('http') ? href : 'https://n.sba1.com' + href;
            if (!items.find(i => i.titulo === titulo)) {
              items.push({ titulo, url, data: '' });
            }
          }
        });
        return items;
      }
    }
  ];

  let todasNoticias = [];

  await Promise.allSettled(fontes.map(async (fonte) => {
    try {
      const html = await fetchComProxy(fonte.url);
      const noticias = fonte.parseNoticias(html);
      noticias.forEach(n => todasNoticias.push({...n, fonte: fonte.nome, cls: fonte.cls}));
    } catch(e) {
      console.warn('Não foi possível buscar', fonte.nome, e.message);
    }
  }));

  // Fallback com links reais verificados — sempre exibido se nada foi buscado
  if (todasNoticias.length === 0) {
    todasNoticias = [
      { titulo: 'Exportações de carne bovina avançam e média diária cresce 36%', url: 'https://n.sba1.com/noticias/Exportacoes-de-carne-bovina-avancam-e-media-diaria-cresce-36-', fonte: 'Canal do Boi', cls: 'canal-boi', data: '19/05' },
      { titulo: 'Abate de bovinos sobe 3,3% no 1º trimestre na comparação anual', url: 'https://n.sba1.com/noticias/abate-de-bovinos-sobe-33-no-1-trimestre-na-comparacao-anual-revela-ibge', fonte: 'Canal do Boi', cls: 'canal-boi', data: '19/05' },
      { titulo: 'Investimento em genética bovina cresce 17,7% no primeiro trimestre de 2026', url: 'https://n.sba1.com/noticias/Investimento-em-genetica-bovina-cresce-17-7-entre-pecuaristas-no-primeiro-trimestre-de-2026', fonte: 'Canal do Boi', cls: 'canal-boi', data: '18/05' },
      { titulo: 'Tocantins: preço do boi gordo fica firme, mas cenário acende sinal de atenção', url: 'https://tocantinsrural.com.br/preco-do-boi-gordo-fica-firme-mas-cenario-no-campo-acende-sinal-de-atencao/', fonte: 'Tocantins Rural', cls: 'tocantins-rural', data: '19/05' },
      { titulo: 'Leilão de gado virtual no Tocantins impulsiona a pecuária regional', url: 'https://tocantinsrural.com.br/leilao-de-gado-virtual-do-agro-360-tocantins-impulsiona-a-pecuaria-e-ganha-visibilidade-em-todo-o-brasil/', fonte: 'Tocantins Rural', cls: 'tocantins-rural', data: '12/02' },
      { titulo: 'Calendário completo de eventos agro no Tocantins 2026', url: 'https://tocantinsrural.com.br/calendario-de-eventos-do-tocantins-confira-as-principais-festas-e-exposicoes-ao-longo-do-ano/', fonte: 'Tocantins Rural', cls: 'tocantins-rural', data: '10/04' },
      { titulo: 'Adapec orienta produtores sobre vacinação e declaração de rebanho', url: 'https://tocantinsrural.com.br/adapec-orienta-produtores-rurais-realizarem-o-recadastramento-da-ferramenta-produtor-on-line-durante-a-campanha-de-declaracao-do-rebanho/', fonte: 'Tocantins Rural', cls: 'tocantins-rural', data: '31/10' },
    ];
  }

  // Separa por fonte para mostrar em seções
  const porFonte = {};
  todasNoticias.forEach(n => {
    if (!porFonte[n.fonte]) porFonte[n.fonte] = [];
    porFonte[n.fonte].push(n);
  });

  let html = '';
  const emojisFonte = { 'Tocantins Rural': '🌿', 'Canal do Boi': '📺', 'Canal Rural': '📡' };

  for (const [fonte, noticias] of Object.entries(porFonte)) {
    html += `<div class="noticias-secao">
      <div class="secao-titulo">${emojisFonte[fonte]||'📰'} ${fonte}</div>`;
    noticias.forEach(n => {
      html += `
        <a class="card-noticia" href="${n.url}" target="_blank" rel="noopener">
          <div class="card-noticia-inner">
            <span class="noticia-arrow">›</span>
            <span class="noticia-fonte ${n.cls}">${n.fonte}</span>
            <div class="noticia-titulo">${n.titulo}</div>
            ${n.data ? `<div class="noticia-data">📅 ${n.data}</div>` : ''}
          </div>
        </a>`;
    });
    html += `</div>`;
  }

  lista.innerHTML = html;
}

// ─── HISTÓRICO ────────────────────────────────────────────────────────────────
function renderGraficos() {
  const animal = animais[animalAtual];
  const cores  = { TO:'#1a6010', GO:'#1a4a8a', PA:'#8a6a00' };
  const wrap   = document.getElementById('graficos-historico');
  wrap.innerHTML = ['TO','GO','PA'].map(s =>
    `<div class="card-grafico">
      <div class="grafico-titulo">📈 ${animal.estados[s].nome} – últimas 2 semanas (R$/${animal.unit})</div>
      <div class="grafico-wrapper"><canvas id="graf${animalAtual}${s}"></canvas></div>
    </div>`).join('');

  for (const s of ['TO','GO','PA']) {
    const key = animalAtual + s;
    if (graficos[key]) graficos[key].destroy();
    const ctx = document.getElementById('graf'+animalAtual+s).getContext('2d');
    graficos[key] = new Chart(ctx, {
      type: 'line',
      data: {
        labels: diasLabel,
        datasets: [{
          data: animal.estados[s].historico,
          borderColor: cores[s], backgroundColor: cores[s]+'18',
          borderWidth: 3, pointRadius: 5, pointBackgroundColor: cores[s], tension: 0.35, fill: true
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: c => ' R$ '+c.parsed.y.toFixed(2).replace('.',',') + '/'+animal.unit } }
        },
        scales: {
          x: { ticks: { font:{size:12}, maxRotation:45, color:'#555' }, grid:{display:false} },
          y: { ticks: { font:{size:13}, callback: v=>'R$'+v.toFixed(0), color:'#333' }, grid:{color:'#f0f0f0'} }
        }
      }
    });
  }
}

// ─── ATUALIZAR TUDO ───────────────────────────────────────────────────────────
async function atualizarTudo() {
  document.querySelectorAll('.btn-atualizar').forEach(b => {
    b.disabled = true;
    b.innerHTML = '<span style="display:inline-block;animation:spin 0.8s linear infinite">🔄</span> Buscando...';
  });
  mostrarStatus('🔄 Buscando cotações...');

  // Tenta buscar cotação real do Tocantins Rural via proxy
  let dadosReais = {};
  try {
    const PROXY = 'https://api.allorigins.win/get?url=';
    const resp = await fetch(PROXY + encodeURIComponent('https://tocantinsrural.com.br/'));
    const json = await resp.json();
    // Extrai preços mencionados no texto da página
    const texto = json.contents || '';
    const matchTO = texto.match(/norte[^R]*R\$\s*(\d{2,3}[.,]\d{2})/i) ||
                    texto.match(/R\$\s*(\d{2,3}[.,]\d{2}).*arroba/i);
    if (matchTO) {
      const preco = parseFloat(matchTO[1].replace(',','.'));
      if (preco > 200 && preco < 600) {
        dadosReais.boigordo = { TO: { ultimo: preco, data: dataHoje() } };
      }
    }
  } catch(e) { /* segue com dados base */ }

  renderCotacoes(dadosReais);
  renderGraficos();

  // Busca notícias em paralelo se estiver na aba de notícias
  if (document.getElementById('aba-noticias').style.display !== 'none') {
    await buscarNoticias();
  }

  document.getElementById('headerData').textContent = dataHoje();
  mostrarStatus('✅ Atualizado! ' + dataHoje(), false, 3000);
  document.querySelectorAll('.btn-atualizar').forEach(b => {
    b.disabled = false;
    b.innerHTML = '🔄 Atualizar';
  });
}

function mostrarStatus(msg, erro=false, sumir=0) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg' + (erro?' erro':'');
  el.style.display = 'block';
  if (sumir) setTimeout(() => el.style.display='none', sumir);
}

function mudarAba(el, aba) {
  document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
  el.classList.add('ativa');
  ['cotacoes','noticias','historico'].forEach(id =>
    document.getElementById('aba-'+id).style.display = 'none');
  document.getElementById('aba-'+aba).style.display = 'block';
  document.getElementById('animalBar').style.display = (aba==='noticias') ? 'none' : 'flex';
  if (aba === 'historico') renderGraficos();
  if (aba === 'noticias')  buscarNoticias();
}

function mudarAnimal(el, animal) {
  document.querySelectorAll('.animal-btn').forEach(b => b.classList.remove('ativo'));
  el.classList.add('ativo');
  animalAtual = animal;
  renderCotacoes({});
  if (document.getElementById('aba-historico').style.display !== 'none') renderGraficos();
}

// INICIAR
window.addEventListener('load', () => {
  document.getElementById('headerData').textContent = dataHoje();
  renderCotacoes({});
  buscarNoticias();
});
</script>
